# CI gate + gated deploy (07-deployment.md §CI/CD, 06-testing-strategy.md §CI gate, ADR-017).
# Platform: GitHub Actions (CI platform not fixed in docs -> reasonable default).
# Any failure on lint / format / type-check / tests / coverage blocks merge AND blocks deploy.
#
# DEPLOY ORDERING (incident fix): deploy is a JOB IN THIS WORKFLOW with
# `needs: [quality, test, build-image]`, so GitHub will NOT start it until ALL CI jobs have
# succeeded. Previously deploy was a SEPARATE workflow also triggered on push:main, so it ran
# in PARALLEL with CI and could deploy a red build. With `needs` + `if: ...success()` the deploy
# is deterministically gated: a failing CI job fails the workflow and deploy never starts.
# Manual / out-of-band redeploys live in deploy.yml (workflow_dispatch only — no push trigger).
name: ci

on:
  push:
    branches: [main]
  pull_request:

# NOTE: this `concurrency` only applies to the CI jobs (quality/test/build-image). The deploy
# job below sets its OWN job-level concurrency (`deploy-production`, no cancel) so an in-flight
# deploy is never cancelled even though superseded CI runs are.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.4.30"
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: lint • format • types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps (uv sync)
        run: uv sync --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

  test:
    name: test • coverage gate
    runs-on: ubuntu-latest
    # Integration/e2e use testcontainers, which need a Docker daemon (present on
    # ubuntu-latest runners). No service containers declared: testcontainers manages them.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps (uv sync)
        run: uv sync --frozen

      # Global coverage gate: 80% (02-tech-stack.md, 06-testing-strategy.md).
      - name: Pytest + coverage (global gate 80%)
        run: >
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

      # Critical packages must hit >=95% (06-testing-strategy.md §Coverage gate).
      - name: Critical-package coverage gate (policy/wallet/byok >=95%)
        run: >
          uv run pytest
          --cov=src/app/policy
          --cov=src/app/wallet
          --cov=src/app/byok
          --cov-report=term-missing
          --cov-fail-under=95
          tests/unit tests/integration

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build-image:
    name: build docker image (validation only)
    runs-on: ubuntu-latest
    needs: [quality, test]
    # ADR-017: the deployable image is BUILT ON THE SERVER (`docker compose up -d --build`),
    # NOT pushed to a registry. This job only VALIDATES that the Dockerfile builds — it does
    # not log in to or push to any registry (no `packages: write`, no GHCR). Deploy is a
    # separate workflow (.github/workflows/deploy.yml: SSH -> git pull -> compose up --build).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: claude-ios-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------------------------
  # Gated deploy — shared server + external Traefik via SSH (docs/07-deployment.md §Процедура
  # деплоя, ADR-017). This job is the FULL deploy and is GATED by `needs` on every CI job:
  # GitHub will not even queue it until quality + test + build-image have all succeeded. Combined
  # with `if: ... && success()` and the branch guard, it runs ONLY on a green push to main.
  #
  # Image is BUILT ON THE SERVER (`docker compose up -d --build`), not pulled from a registry
  # (ADR-017 — no immutable registry tag; rollback = git checkout <prev-commit> + rebuild).
  #
  # Flow: SSH -> cd /opt/claude-ios -> git pull -> compose run --rm migrate -> up -d --build ->
  #       smoke curl https://${SERVICE_DOMAIN}/healthz.
  #
  # GitHub Secrets (Settings -> Secrets and variables -> Actions): NEVER hardcode these.
  #   SSH_HOST=87.239.135.154 / SSH_USER=root / SSH_PRIVATE_KEY (public half in server authorized_keys)
  # Optional repo Variable (not a secret): SERVICE_DOMAIN=broadnova.shop (Q-017-1). If unset the
  # smoke step is skipped (e.g. before the A-record / TLS cert exists on the first deploy).
  #
  # ROLLBACK (no registry/immutable tag): on the server, in /opt/claude-ios:
  #   git log --oneline -n 5 ; git checkout <prev-commit>
  #   docker compose -f docker-compose.prod.yml run --rm migrate   # if needed (expand/contract)
  #   docker compose -f docker-compose.prod.yml up -d --build
  # Schema is NOT reverted (expand/contract migrations keep the old code compatible). See
  # docs/07-deployment.md §Откат and infra/deploy/README.md.
  deploy:
    name: ssh deploy (shared server + Traefik)
    runs-on: ubuntu-latest
    # Hard gate: do not start until ALL CI jobs pass (deterministic ordering — fixes the incident
    # where deploy ran in parallel with / ahead of CI).
    needs: [quality, test, build-image]
    # Deploy only from main, and only if the needed jobs all succeeded (a failed `needs` would
    # normally skip this, but `success()` makes the intent explicit and guards against re-runs).
    if: ${{ github.ref == 'refs/heads/main' && success() }}
    # Optional GitHub Environment for required reviewers / protection rules on prod deploys.
    environment: production
    permissions:
      contents: read
    # Single in-flight deploy; do NOT cancel one mid-run (avoid half-applied state). This is a
    # JOB-level concurrency, independent of the workflow-level `ci-*` group above.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Abort on the first failing command; -u catches unset vars.
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/claude-ios
            echo "[deploy] git pull"
            git pull --ff-only
            echo "[deploy] migrate (alembic upgrade head, chain 0001->0004)"
            docker compose -f docker-compose.prod.yml --env-file .env run --rm migrate
            echo "[deploy] build + restart (image built on the server)"
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build
            echo "[deploy] prune dangling build layers (best-effort)"
            docker image prune -f || true

      # Public smoke check through Traefik (TLS + Host routing). SERVICE_DOMAIN is a repo Variable
      # (not a secret), resolved to broadnova.shop. Skipped if unset (e.g. before the domain/
      # A-record exists). NON-FATAL by design: the deploy itself (migrate + build + up) already
      # succeeded above; on the FIRST deploy the A-record may not have propagated or Traefik's
      # Let's Encrypt cert (resolver `le`) may still be issuing, which would make this transiently
      # fail through no fault of the build. We retry (12 x 5s = 60s) and, if still not green, emit
      # a ::warning:: instead of failing the workflow.
      - name: Smoke check /healthz (public, through Traefik)
        if: ${{ vars.SERVICE_DOMAIN != '' }}
        run: |
          set -uo pipefail
          url="https://${{ vars.SERVICE_DOMAIN }}/healthz"
          echo "[smoke] GET $url"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 5 "$url" >/dev/null; then
              echo "[smoke] healthz OK"
              exit 0
            fi
            echo "[smoke] not ready ($i/12) — retrying in 5s"
            sleep 5
          done
          echo "::warning title=Smoke /healthz not green::$url did not return 200 within 60s. The deploy (migrate+build+up) succeeded; DNS/A-record propagation or Traefik's Let's Encrypt cert (resolver 'le') may still be settling on the first deploy. Re-run this workflow once they are ready."
          exit 0
